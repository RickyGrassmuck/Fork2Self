name: Build XPI

# Manual-only. No push/PR triggers — run from the Gitea Actions UI when
# you're ready to cut a build artifact.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Read version
        id: version
        run: echo "version=$(bun pm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Package XPI
        run: |
          cd dist
          zip -r -FS "../fork2self-${{ steps.version.outputs.version }}.xpi" .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: fork2self-${{ steps.version.outputs.version }}
          path: fork2self-${{ steps.version.outputs.version }}.xpi
          if-no-files-found: error
