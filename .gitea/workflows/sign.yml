name: Sign and publish

# Manual-only. Submits the built extension to Mozilla's AMO for signing
# (and, if channel=listed, public listing & review). Requires the
# WEB_EXT_API_KEY and WEB_EXT_API_SECRET secrets to be set on the repo.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "AMO channel"
        type: choice
        required: true
        default: "unlisted"
        options:
          - unlisted
          - listed

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint extension
        run: npm run lint:ext

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Sign with web-ext
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir dist \
            --artifacts-dir web-ext-artifacts \
            --channel "${{ inputs.channel }}"

      - name: Upload signed XPI
        uses: actions/upload-artifact@v3
        with:
          name: fork2self-${{ steps.version.outputs.version }}-${{ inputs.channel }}-signed
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error
