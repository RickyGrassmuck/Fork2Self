name: Sign and publish

# Manual-only. Submits the built extension to Mozilla's AMO for signing
# (and, if channel=listed, public listing & review). Requires the
# WEB_EXT_API_KEY and WEB_EXT_API_SECRET secrets to be set on the repo.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "AMO channel"
        type: choice
        required: true
        default: "unlisted"
        options:
          - unlisted
          - listed

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint extension
        run: bun run lint:ext

      - name: Read version
        id: version
        run: echo "version=$(bun pm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Sign with web-ext
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          bunx web-ext sign \
            --source-dir dist \
            --artifacts-dir web-ext-artifacts \
            --channel "${{ inputs.channel }}" \
            --amo-metadata amo-metadata.json

      - name: Upload signed XPI
        uses: actions/upload-artifact@v3
        with:
          name: fork2self-${{ steps.version.outputs.version }}-${{ inputs.channel }}-signed
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error
